name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release from this run'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build CIPX
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PrivacyIsland.slnx

      - name: Build
        run: dotnet build PrivacyIsland.slnx -c Release --no-restore

      - name: Smoke test
        run: dotnet run --project PrivacyIsland.SmokeTest/PrivacyIsland.SmokeTest.csproj -c Release --no-build

      - name: Package CIPX
        run: dotnet build PrivacyIsland/PrivacyIsland.csproj -c Release --no-restore -p:CreateCipx=true -p:GenerateHashSummary=true

      - name: Upload CIPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivacyIsland-cipx
          path: |
            PrivacyIsland/cipx/PrivacyIsland.cipx
            PrivacyIsland/cipx/checksums.md
          if-no-files-found: error

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PrivacyIsland ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            PrivacyIsland/cipx/PrivacyIsland.cipx
            PrivacyIsland/cipx/checksums.md

      - name: Create manual release
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-${{ github.run_number }}
          name: PrivacyIsland manual-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            PrivacyIsland/cipx/PrivacyIsland.cipx
            PrivacyIsland/cipx/checksums.md
